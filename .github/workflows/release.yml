name: Release

on:
  push:
    tags:
      - 'core-v*'
      - 'react-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all
        run: bun run build

      - name: Determine package
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == core-v* ]]; then
            echo "dir=packages/core" >> "$GITHUB_OUTPUT"
            echo "name=@i18nez/core" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == react-v* ]]; then
            echo "dir=packages/react" >> "$GITHUB_OUTPUT"
            echo "name=@i18nez/react" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag prefix: $TAG" >&2
            exit 1
          fi

      - name: Verify tag matches package.json version
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#*-v}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
